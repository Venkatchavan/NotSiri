name: CI – Build Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  SCHEME: AgenticOS
  PROJECT: AgenticOS.xcodeproj
  DESTINATION: platform=macOS

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # ── Detect available Xcode version ───────────────────────────────────────
      - name: Detect Xcode version
        id: xcode
        run: |
          # Try Xcode 26 first (macOS Golden Gate runners), fall back to whatever is installed
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          elif [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          VERSION=$(xcodebuild -version 2>/dev/null | head -1 | grep -oE '[0-9]+' | head -1)
          echo "XCODE_MAJOR=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Xcode major version: $VERSION"
          xcodebuild -version

      # ── Build (requires Xcode 26+ for FoundationModels) ──────────────────────
      - name: Build
        run: |
          xcodebuild build \
            -project $PROJECT \
            -scheme $SCHEME \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      # ── Secret scan ──────────────────────────────────────────────────────────
      - name: Lint – no hardcoded secrets
        run: |
          if grep -rn "sk-ant-\|AIzaSy\|ghp_\|glpat-\|ghs_" \
               --include="*.swift" --include="*.json" --include="*.plist" .; then
            echo "❌ Potential secret detected!"
            exit 1
          fi
          echo "✅ No secrets found in source"
